<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync Dashboard</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2E7D32',
                        primaryDark: '#1B5E20',
                        secondary: '#F9A825',
                        secondaryDark: '#F57F17'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-green-50 font-sans">

<div x-data="{ sidebarOpen: true }" class="flex h-screen">

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'w-64' : 'w-20'" class="bg-primary text-white transition-all duration-300 flex flex-col">

        <!-- Logo -->
        <div class="p-4 flex items-center justify-between border-b border-green-800">
            <span x-show="sidebarOpen" class="text-lg font-bold">EduSync</span>
            <button @click="sidebarOpen = !sidebarOpen">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <!-- Menu -->
        <nav class="flex-1 p-3 space-y-2">

            <a href="#" class="flex items-center p-3 rounded-lg hover:bg-primaryDark transition">
                <i class="fas fa-home"></i>
                <span x-show="sidebarOpen" class="ml-3">Dashboard</span>
            </a>

            <a href="#" class="flex items-center p-3 rounded-lg hover:bg-primaryDark transition">
                <i class="fas fa-user-graduate"></i>
                <span x-show="sidebarOpen" class="ml-3">Students</span>
            </a>

            <a href="#" class="flex items-center p-3 rounded-lg hover:bg-primaryDark transition">
                <i class="fas fa-chalkboard-teacher"></i>
                <span x-show="sidebarOpen" class="ml-3">Teachers</span>
            </a>

            <a href="#" class="flex items-center p-3 rounded-lg hover:bg-primaryDark transition">
                <i class="fas fa-file-invoice-dollar"></i>
                <span x-show="sidebarOpen" class="ml-3">Finance</span>
            </a>

            <a href="#" class="flex items-center p-3 rounded-lg hover:bg-primaryDark transition">
                <i class="fas fa-cogs"></i>
                <span x-show="sidebarOpen" class="ml-3">Settings</span>
            </a>

        </nav>

        <!-- Footer -->
        <div class="p-4 border-t border-green-800 text-sm">
            <span x-show="sidebarOpen">© EduSync Pro</span>
        </div>

    </aside>


    <!-- Main Content -->
    <div class="flex-1 flex flex-col">

        <!-- Topbar -->
        <header class="bg-white shadow px-6 py-4 flex justify-between items-center">

            <h1 class="text-xl font-semibold text-gray-700">Dashboard</h1>

            <div class="flex items-center space-x-4">

                <!-- Notification -->
                <button class="relative">
                    <i class="fas fa-bell text-gray-600"></i>
                    <span class="absolute -top-1 -right-1 bg-secondary text-white text-xs px-1 rounded-full">3</span>
                </button>

                <!-- Profile -->
                <div class="flex items-center space-x-2 cursor-pointer">
                    <img src="https://i.pravatar.cc/40" class="rounded-full w-8 h-8">
                    <span class="text-gray-700 text-sm">Admin</span>
                </div>

            </div>

        </header>


        <!-- Content -->
        <main class="p-6 overflow-y-auto">

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                <div class="bg-white p-5 rounded-xl shadow">
                    <h2 class="text-gray-500 text-sm">Total Students</h2>
                    <p class="text-2xl font-bold text-primary mt-2">1,240</p>
                </div>

                <div class="bg-white p-5 rounded-xl shadow">
                    <h2 class="text-gray-500 text-sm">Fees Collected</h2>
                    <p class="text-2xl font-bold text-secondary mt-2">KES 320,000</p>
                </div>

                <div class="bg-white p-5 rounded-xl shadow">
                    <h2 class="text-gray-500 text-sm">Pending Fees</h2>
                    <p class="text-2xl font-bold text-red-500 mt-2">KES 80,000</p>
                </div>

            </div>


            <!-- Recent Activity -->
            <div class="mt-8 bg-white p-6 rounded-xl shadow">
                <h2 class="text-lg font-semibold mb-4">Recent Activity</h2>

                <ul class="space-y-3 text-sm text-gray-600">
                    <li>✔ Student John Doe registered</li>
                    <li>✔ Payment received from Mary</li>
                    <li>✔ New exam results uploaded</li>
                </ul>
            </div>

        </main>

    </div>

</div>

</body>
</html>
